<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício Prático Aula 06</title>
  </head>
  <body>
    <h1>Cadastro de Aluno - DSM</h1>
    <p>Formulário de cadastro para os alunos do curso de DSM</p>
    <form action="#" method="POST">
      <fieldset>
        <legend>Dados Pessoais</legend>
        <label for="nome">Nome Completo</label>
        <input type="text" name="nome" id="nome" required />
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" required />
        <label for="data" name="data" id="data">Data de nascimento</label>
        <input type="date" required />
      </fieldset>

      <filedset>
        <legend>Dados Acadêmicos</legend>
        <select name="curso">
          <option value="dsm">DSM</option>
          <option value="ads">ADS</option>
          <option value="outro">Outro</option>
        </select>
        <input type="radio" value="m" name="periodo" />Manhã
        <input type="radio" value="n" name="periodo" />Noite
        <textarea name="Observações" rows="4" cols="40"></textarea>

        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
      </filedset>
    </form>
  </body>
</html>
