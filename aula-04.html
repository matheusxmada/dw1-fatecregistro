<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mídias no HTML 5</title>
  </head>
  <body>
    <header>
      <h1>Galeria de fotos:</h1>
    </header>
    <main>
      <section>
        <!-- Importando imagens local-->
        <img src="midias/imagem.jpg" alt="Paisagem" width="300" height="300" />

        <br /><br /><br />
        <!-- Importando imagens externas -->
        <img src="https://picsum.photos/id/100/300/200" alt="Imagem 01" />
        <img src="https://picsum.photos/id/102/300/200" alt="Imagem 02" />
        <img src="https://picsum.photos/id/103/300/200" alt="Imagem 03" />
        <img src="https://picsum.photos/id/104/300/200" alt="Imagem 04" />
        <img src="https://picsum.photos/id/120/300/200" alt="Imagem 05" />
        <img src="https://picsum.photos/id/106/300/200" alt="Imagem 06" />
        <img src="https://picsum.photos/id/107/300/200" alt="Imagem 07" />
        <img src="https://picsum.photos/id/108/300/200" alt="Imagem 08" />
        <img src="https://picsum.photos/id/109/300/200" alt="Imagem 09" />
        <img src="https://picsum.photos/id/110/300/200" alt="Imagem 10" />
        <img src="https://picsum.photos/id/111/300/200" alt="Imagem 11" />
        <img src="https://picsum.photos/id/1/300/200" alt="Imagem 12" />
      </section>
      <br /><br /><br />
      <!-- Imagem com legenda -->
      <section>
        <figure>
          <img
            src="midias/grafico.png"
            alt="Gráfico de crescimento anual da empresa."
            width="300px"
          />
          <figcaption>
            Gráfico de crescimento da empresa no ano de 2025.
          </figcaption>
        </figure>
      </section>
    </main>
    <br>
    <footer>
      <p><em>&copy; 2026 - FATEC Registro - DSM</em></p>
    </footer>
  </body>
</html>
