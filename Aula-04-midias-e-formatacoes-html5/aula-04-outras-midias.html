<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outras mídias no HTML5</title>
  </head>
  <body>
    <header>
      <h1>Outras mídias do HTML5</h1>
    </header>
    <main>
      <section>
        <h2>Áudio</h2>
        <audio controls src="midias/audio.mp3"></audio>
        <!-- controls confere um controle de reprodução de audio -->

        <h2>Vídeo</h2>
        <video controls src="midias/video.mp4" type="video/mp4" width="400px">
          Vídeo não encontrado ou não suportado.
        </video>
        <!-- largura -> width
        altura -> height -->

        <h2>Vídeo do Youtube (externo) - iFrame</h2>
        <iframe
          src=""
          title="Exemplo de vídeo do Youtube"
          width="560"
          height="315"
          frameborder="0"
        >
        </iframe>

        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/LX9kXRRJlPw?si=bw3orfDfrZz-Oi5a"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>

        <!-- Incorporando mapas -->
        <h2>Mapas (iframe)</h2>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14522.736230243607!2d-47.84635758714349!3d-24.496401492891305!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94c5338bea658bc1%3A0xdea6f93b5aae61a8!2sFatec%20Registro!5e0!3m2!1spt-BR!2sbr!4v1773192541509!5m2!1spt-BR!2sbr"
          width="600"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>

        <!-- Incorporando PDFs -->
        <h2>PDF (iframe)</h2>
        <iframe
          src="midias/documento.pdf"
          frameborder="0"
          title="Horários DSM-1"
          width="600px"
          height="450px"
        >
        </iframe>

        <!-- Incorporando vetores -->
        <h2>Vetores (ilustrações)</h2>
        <svg
          width="927"
          height="927"
          viewBox="0 0 927 927"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M154.5 772.5H772.5V849.75H154.5V772.5ZM154.5 77.25H772.5V154.5H154.5V77.25ZM77.25 77.25H154.5V849.75H77.25V77.25ZM772.5 77.25H849.75V849.75H772.5V77.25ZM270.375 502.125H347.625V579.375H270.375V502.125ZM347.625 579.375H579.375V656.625H347.625V579.375ZM579.375 502.125H656.625V579.375H579.375V502.125ZM309 309H386.25V386.25H309V309ZM540.75 309H618V386.25H540.75V309Z"
            fill="black"
          />
        </svg>
      </section>
    </main>
  </body>
</html>
