<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de site com HTML5 semântico</title>
</head>
<body>
    <!-- Cabeçalho do site -->
    <header>
        <h1>Portal de notícias</h1>
    </header>

    <!-- Menu de navegação -->
    <nav>
        <a href="#"><p>Home</p></a>
        <a href="#"><p>Tecnologia</p>
        <a href="#"><p>Esportes</p></a>
        <a href="#"><p>Fazer Login</p></a>
        </a>
    </nav>
    <!-- Linha divisória -->
     <hr>

     <!-- A parte central (principal) do site-->
    <main>
       <!-- Cria uma seção no site -->
        <section>
            <h2>Últimas Notícias</h2>
            <article>
                <h3>HTML5 ganha destaque</h3>
                <p>O HTML5 trouxe melhoras significativas para a web.</p>
            </article>

            <article>
                <h3>CSS e JavaScript</h3>
                <p>Tecnologias que trabalham em conjunto com HTML.</p>
            </article>
        </section>
        <hr />
        <!-- Conteúdo secundário do site -->
         <aside>
            <h3>Anúncios</h3>
            <!-- strong deixa o texto em negrito -->
         </aside>
    </main>
    <hr />
    <footer><em>&copy; 2026 - Portal de Notícias</em></footer>
</body>
</html>
